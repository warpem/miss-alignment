general:
  # MissAlignment 💃 iteratively trains models and realigns the tilt-series
  # here you can continue training from a specific iteration
  start_at_iteration: 0
  resume_training_from_checkpoint: False
  seed: 45132

model_training:
  # used to initialize model weights
  model_checkpoint: /path/to/model.ckpt
  output_directory: /path/to/  # here model checkpoints are stored in lightning_log directories
  loss_margin: 0.5
  initial_learning_rate: 1e-3
  warm_up_steps: 200
  # Uncomment to enable weight decay
  # weight_decay: 1e-4
  # Uncomment to enable learning rate scheduler
  # lr_scheduler:  # warm-up
  #   mode: "min"
  #   factor: 0.5
  #   patience: 2
  #   monitor: "val loss"
  #   interval: "epoch"
  #   frequency: 1
  max_epochs_per_iteration: 100  # absolute maximum of stopping
  log_every_n_steps: 50  # this logging might affect the stopping condition
  stop_condition: ...

data_loading:
  dataset_type: "SHREC"  # Options: "SHREC", "EMDB"
  dataset_directory: /data/set/  # path to dataset location
  download_data: True  # download data from zenodo to folder/iter0 if its empty
  batch_size: 32  # for SHREC these values seems solid:
  patch_size: 128  # batch size 32 | reconstruction size 128 ^ 3
  patches_per_tomogram: 1000  # number of reconstruction locations to randomly sample

# this configures the shift generation for the contrastive training of MissAlignment 💃
# all parameters are in units of 10Å (nm) as we assume to work with tilt-series sampled to 10A
shift_generation:
  trajectory_probability: .5   # these make bananas and birds
  trajectory_max_shift: 10.0  # (10 Å) trajectories fall somewhere between +/- f
  jitter_probability: .5
  jitter_max_std: 3.0  # (10 Å) maximum standard deviation of a normal distribution
  outlier_probability: .4
  outlier_max_shift: 20.0  # (10 Å) outlier can maximally go to this value
  high_tilt_outlier_probability: .4
  high_tilt_max_shift: 30.0  # (10 Å) specific strong shifts for high tilt images up to this value
